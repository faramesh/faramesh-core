faramesh-version: "1.0"
agent-id: "p2-docs-writer"
default_effect: deny

budget:
  max_calls: 1800
  on_exceed: defer

rules:
  - id: permit-search
    match:
      tool: "search/*"
    effect: permit
    reason: "doc and repo search"

  - id: permit-file-read
    match:
      tool: "file/read/*"
    effect: permit
    reason: "read sources for drafting"

  - id: permit-internal-docs-http
    match:
      tool: "http/get"
      when: "args.url != nil && args.url matches \"https://docs.internal|https://wiki.internal|http://localhost\""
    effect: permit
    reason: "internal documentation endpoints"

  - id: defer-publish-write
    match:
      tool: "file/write/*"
    effect: defer
    reason: "publishing or overwriting docs requires review"

  - id: deny-shell
    match:
      tool: "shell/*"
    effect: deny
    reason: "doc agents must not invoke shell"
