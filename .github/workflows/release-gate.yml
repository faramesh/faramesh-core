name: release-gate

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOFLAGS: -mod=readonly

jobs:
  policy-replay:
    name: Policy Replay (P8)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Skip policy replay (policy CLI removed)
        run: |
          echo "Skipping policy replay: policy CLI commands removed in this branch."

  policy-suite:
    name: Policy Suite (P8)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Skip policy fixture suite (policy CLI removed)
        run: |
          echo "Skipping policy fixture suite: policy CLI commands removed in this branch."

  policy-fpl:
    name: FPL Golden (P4/P8)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip FPL golden gate
        run: |
          echo "Skipping FPL golden gate: retired from release-gate."

  verify-buildinfo:
    name: Buildinfo fingerprint (P8)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Emit and validate buildinfo JSON
        run: |
          go run ./cmd/faramesh verify buildinfo --emit | jq -e '(.go_version | length) > 0 and (.main_path | length) > 0'

  docker-image:
    name: Docker image build (release binary)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t faramesh:ci -f Dockerfile .

  policy-backtest:
    name: Policy Backtest (P8)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Skip policy backtest (policy CLI removed)
        run: |
          echo "Skipping policy backtest: policy CLI commands removed in this branch."

  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run full go test
        run: go test ./... -count=1

  adversarial-tests:
    name: Adversarial Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run adversarial profile
        run: go test ./... -tags=adversarial -count=1

  integration-matrix:
    name: Integration (${{ matrix.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile: [default, race]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration default profile
        if: matrix.profile == 'default'
        run: go test ./... -count=1

      - name: Run integration race profile
        if: matrix.profile == 'race'
        run: go test ./... -race -count=1

  corpus-matrix:
    name: Corpus contract + matrix (release)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/node/package-lock.json

      - name: Clone fpl-lang
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/faramesh/fpl-lang.git ../fpl-lang

      - name: Corpus check
        run: make corpus-check

  corpus-harness:
    name: Corpus Harness (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: deepagents-governed
            entry: tests/corpus/framework-hooks/deepagents-governed
          - id: langgraph-multi-agent
            entry: tests/corpus/framework-hooks/langgraph-multi-agent
          - id: mcp-stdio-wrap
            entry: tests/corpus/mcp-servers/mcp-stdio-wrap
          - id: mcp-http-sse
            entry: tests/corpus/mcp-servers/mcp-http-sse
          - id: defer-timeout-resume
            entry: tests/corpus/runtime-core/defer-timeout-resume
          - id: burst-rate-limits
            entry: tests/corpus/runtime-core/burst-rate-limits
          - id: socket-e2e-acceptance
            entry: tests/corpus/runtime-core/socket-e2e-acceptance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/node/package-lock.json

      - name: Install Vault CLI
        run: |
          set -euo pipefail
          VAULT_VERSION="1.17.6"
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fsSL -o vault.zip "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          unzip -q vault.zip
          sudo install vault /usr/local/bin/vault
          vault version

      - name: Run corpus entry
        run: bash scripts/run_corpus_entry.sh "${{ matrix.entry }}"

  linux-interception-matrix:
    name: Linux Interception Matrix (retired)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip Linux interception gate
        run: |
          echo "Skipping Linux interception matrix: retired from release-gate."

  e2e-completion-gate:
    name: E2E completion_gate (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run completion_gate E2E
        run: bash tests/e2e_completion_gate.sh

  node-autopatch-real-stack:
    name: Node Autopatch Real Stack (socket)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk/node/package-lock.json

      - name: Run Node autopatch real-stack harness
        run: make node-autopatch-harness

