faramesh-version: "1.0"
agent-id: "network-controls"
default_effect: deny

budget:
  max_calls: 5000
  on_exceed: defer

rules:
  - id: permit-internal-http
    match:
      tool: "http/get"
      when: "args.url != nil && args.url matches \"http://localhost|https://localhost|https://corp.internal\""
    effect: permit
    reason: "internal and localhost reads allowed"

  - id: defer-external-http
    match:
      tool: "http/*"
    effect: defer
    reason: "external HTTP requires human approval"

  - id: deny-shell
    match:
      tool: "shell/*"
    effect: deny
    reason: "network agent must not run shell"
