name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  top-level-allowlist:
    name: Top-level Allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce top-level allowlist
        run: bash scripts/ci/check_top_level_allowlist.sh

  burst-rate-harness:
    name: Burst Rate Harness
    runs-on: ubuntu-latest
    needs: [top-level-allowlist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run burst rate-limit harness
        run: make burst-rate-harness

  defer-timeout-resume-harness:
    name: Defer Timeout Resume Harness
    runs-on: ubuntu-latest
    needs: [top-level-allowlist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run defer timeout/resume stress harness
        run: make defer-timeout-resume-harness

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [top-level-allowlist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [top-level-allowlist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  python-sdk-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    needs: [top-level-allowlist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python SDK test dependencies
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run Python SDK tests
        working-directory: sdk/python
        run: pytest -q tests

  node-sdk-tests:
    name: Node SDK Tests
    runs-on: ubuntu-latest
    needs: [top-level-allowlist]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/node/package-lock.json
      - name: Install Node SDK dependencies
        working-directory: sdk/node
        run: npm ci
      - name: Run Node SDK tests
        working-directory: sdk/node
        run: npm test
      - name: Build Node SDK
        working-directory: sdk/node
        run: npm run build

  homebrew-formula-lint:
    name: Homebrew Formula Lint
    runs-on: macos-latest
    needs: [top-level-allowlist]
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Lint Homebrew formula
        run: brew style Formula/faramesh.rb
      - name: Validate Homebrew formula syntax
        run: ruby -c Formula/faramesh.rb

  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, test, python-sdk-tests, node-sdk-tests, homebrew-formula-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-X main.version=ci-${GITHUB_SHA::8} -s -w" \
            -o faramesh ./cmd/faramesh
      - name: Verify version
        run: ./faramesh --version
      - name: Validate FPL examples
        run: |
          for f in examples/*.fpl; do
            echo "Validating $f..."
            ./faramesh policy validate "$f"
          done
      - name: Run demo (smoke test)
        run: ./faramesh demo

  cross-compile:
    name: Cross-compile (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags="-X main.version=ci-${GITHUB_SHA::8} -s -w" \
            -o faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/faramesh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: faramesh-${{ matrix.suffix }}
          path: faramesh-${{ matrix.suffix }}${{ matrix.ext || '' }}
          retention-days: 14

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: faramesh/faramesh:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
