# Seed pack: DevOps agents — defer risky automation.
faramesh-version: "1.0"
agent-id: "devops-safe"

rules:
  - id: kubectl-defer
    match:
      tool: "kubectl/*"
    effect: defer
    reason: "kubectl changes require approval"
    reason_code: RULE_DEFER

  - id: shell-defer
    match:
      tool: "shell/exec"
    effect: defer
    reason: "shell requires approval on devops profile"
    reason_code: RULE_DEFER

default_effect: deny
