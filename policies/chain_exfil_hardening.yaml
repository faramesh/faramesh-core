faramesh-version: "1.0"
agent-id: "outbound-assistant"
default_effect: deny

rules:
  - id: deny-email-sequence-read-to-draft
    match:
      tool: "draft_email_with_body"
      when: "history_sequence('read_customer_db', 'draft_email_with_body')"
    effect: deny
    reason: "direct read->draft sequence blocked"
    reason_code: "SEQUENCE_EXFIL_BLOCK"

  - id: defer-email-after-recent-customer-read
    match:
      tool: "draft_email_with_body"
      when: "history_contains_within('read_customer_db', 300)"
    effect: defer
    reason: "recent customer read before outbound draft requires approval"
    reason_code: "SEQUENCE_EXFIL_REVIEW"

  - id: deny-draft-missing-purpose
    match:
      tool: "draft_email_with_body"
      when: "!purpose('customer_support_response')"
    effect: deny
    reason: "outbound draft purpose must be customer_support_response"
    reason_code: "PURPOSE_MISMATCH"

  - id: deny-draft-multi-recipient
    match:
      tool: "draft_email_with_body"
      when: "args_array_len('recipients') != 1"
    effect: deny
    reason: "exactly one recipient is allowed"
    reason_code: "RECIPIENT_CARDINALITY"

  - id: deny-draft-non-allowlisted-domain
    match:
      tool: "draft_email_with_body"
      when: "!args_array_any_match('recipients', '*@company.com')"
    effect: deny
    reason: "recipient domain not in allowlist"
    reason_code: "RECIPIENT_DOMAIN_BLOCKED"

  - id: defer-draft-high-risk-intent
    match:
      tool: "draft_email_with_body"
      when: "session.intent_class == 'potentially_adversarial' || session.intent_class == 'high_risk_intent'"
    effect: defer
    reason: "high-risk intent classification requires approval"
    reason_code: "INTENT_CLASS_HIGH_RISK"

  - id: permit-draft-safe
    match:
      tool: "draft_email_with_body"
      when: "purpose('customer_support_response') && args_array_len('recipients') == 1 && args_array_any_match('recipients', '*@company.com')"
    effect: permit
    reason: "approved outbound draft"
    reason_code: "DRAFT_SAFE"

  - id: deny-proxy-sequence-read-to-egress
    match:
      tool: "proxy/http"
      when: "history_sequence('read_customer_db', 'proxy/http')"
    effect: deny
    reason: "direct read->egress proxy sequence blocked"
    reason_code: "SEQUENCE_EXFIL_PROXY_BLOCK"

  - id: defer-proxy-after-recent-customer-read
    match:
      tool: "proxy/http"
      when: "history_contains_within('read_customer_db', 300)"
    effect: defer
    reason: "recent customer read before proxy egress requires approval"
    reason_code: "SEQUENCE_EXFIL_PROXY_REVIEW"

  - id: permit-egress-openai-responses
    match:
      tool: "proxy/http"
      host: "api.openai.com"
      method: "POST"
      path: "/v1/responses"
    effect: permit
    reason: "approved egress route"
    reason_code: "EGRESS_ALLOW_OPENAI_RESPONSES"

  - id: permit-egress-anthropic-messages
    match:
      tool: "proxy/http"
      host: "api.anthropic.com"
      method: "POST"
      path: "/v1/messages"
    effect: permit
    reason: "approved egress route"
    reason_code: "EGRESS_ALLOW_ANTHROPIC_MESSAGES"

  - id: deny-unapproved-egress
    match:
      tool: "proxy/http"
    effect: deny
    reason: "egress route is not allowlisted"
    reason_code: "EGRESS_BLOCK_DEFAULT"
