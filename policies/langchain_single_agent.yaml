faramesh-version: "1.0"
agent-id: "langchain-single"
default_effect: deny

tools:
  vault/probe:
    tags:
      - "credential:required"
      - "credential:broker"
      - "credential:scope:payments"
  payment/refund:
    tags:
      - "risk:high"

rules:
  - id: permit-http
    match:
      tool: "http/get"
      when: "true"
    effect: permit

  - id: permit-vault-probe
    match:
      tool: "vault/probe"
      when: "true"
    effect: permit

  - id: defer-payment-refund
    match:
      tool: "payment/refund"
      when: "true"
    effect: defer
    reason: "refund requires operator approval"

  - id: idp-principal-probe
    match:
      tool: "idp/probe"
      when: "principal.verified == true"
    effect: permit
