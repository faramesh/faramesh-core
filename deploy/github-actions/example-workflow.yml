# Reference: run policy checks in CI with the same binary as production.
# Install faramesh (e.g. download release asset or `go install` from this repo).

name: faramesh-policy-check
on:
  push:
    paths:
      - "policy.yaml"
      - ".github/workflows/faramesh-policy-check.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install faramesh
        run: |
          go install github.com/faramesh/faramesh-core/cmd/faramesh@latest || true
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Policy validate
        run: faramesh policy validate policy.yaml
      - name: Policy suite (optional)
        run: faramesh policy suite policy.yaml --fixtures tests/policy_suite_fixtures.yaml
        continue-on-error: true
