# Seed pack: financial SaaS agent governance (starter — tune for production).
faramesh-version: "1.0"
agent-id: "financial-saas"

tools:
  stripe/refund:
    reversibility: reversible
    blast_radius: external
    cost_usd: 0.01
    tags: ["pii", "payments"]

rules:
  - id: refund-human-review
    match:
      tool: "stripe/refund"
    effect: defer
    reason: "refunds require approval on this profile"
    reason_code: RULE_DEFER

  - id: deny-shell
    match:
      tool: "shell/*"
    effect: deny
    reason: "shell not permitted on financial profile"
    reason_code: RULE_DENY
    incident_category: destructive_command
    incident_severity: high

default_effect: deny
