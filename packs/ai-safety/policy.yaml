# Seed pack: LLM agents — conservative defaults.
faramesh-version: "1.0"
agent-id: "ai-safety"

rules:
  - id: http-post-defer
    match:
      tool: "http/post"
    effect: defer
    reason: "POST requests require approval"
    reason_code: RULE_DEFER

  - id: permit-read-only-http
    match:
      tool: "http/get"
    effect: permit
    reason: "read-only HTTP allowed"
    reason_code: RULE_PERMIT

default_effect: deny
