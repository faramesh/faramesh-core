faramesh-version: "1.0"
agent-id: "p2-data-agent"
default_effect: deny

budget:
  max_calls: 2500
  on_exceed: defer

rules:
  - id: permit-reads-and-search
    match:
      tool: "search/*"
    effect: permit
    reason: "knowledge and catalog search for analytics workflows"

  - id: permit-file-read
    match:
      tool: "file/read/*"
    effect: permit
    reason: "read datasets and reports in workspace"

  - id: permit-internal-http
    match:
      tool: "http/get"
      when: "args.url != nil && args.url matches \"https://metrics.internal|https://warehouse-staging|http://localhost\""
    effect: permit
    reason: "internal metrics and staging warehouse pulls"

  - id: defer-external-http
    match:
      tool: "http/get"
      when: "true"
    effect: defer
    reason: "external API pulls require review before production data paths"

  - id: defer-exports
    match:
      tool: "file/write/*"
    effect: defer
    reason: "exports and snapshots can exfiltrate regulated data"

  - id: deny-shell
    match:
      tool: "shell/*"
    effect: deny
    reason: "data agents must not invoke shell"